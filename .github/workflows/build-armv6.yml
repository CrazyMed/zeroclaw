name: 1Sync Upstream and Build ARMv6

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    inputs:
      target_tag:
        description: '编译版本号（可选，不填则自动检测最新）'
        required: false
        default: ''

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  UPSTREAM_REPO: zeroclaw-labs/zeroclaw
  # ✅ ARMv6 使用 nightly 工具链，或改用 ARMv7
  TARGET: armv6l-unknown-linux-musleabihf
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  check-upstream:
    name: Check Upstream Release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      should_sync: ${{ steps.check.outputs.should_sync }}
    steps:
      - name: Check upstream releases
        id: check
        run: |
          set -euo pipefail

          echo "🔍 检查上游仓库 ${{ env.UPSTREAM_REPO }} 的新版本..."

          TARGET_TAG="${{ github.event.inputs.target_tag }}"
          
          if [ -z "$TARGET_TAG" ]; then
            LATEST_RELEASE=$(gh api repos/${{ env.UPSTREAM_REPO }}/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
            if [ -z "$LATEST_RELEASE" ]; then
              echo "❌ 无法获取上游版本信息"
              exit 1
            fi
          else
            LATEST_RELEASE="$TARGET_TAG"
            echo "📌 使用手动指定版本: $LATEST_RELEASE"
          fi

          echo "上游最新版本: $LATEST_RELEASE"

          CURRENT_RELEASE=$(gh api repos/${{ github.repository }}/releases --jq '.[0].tag_name' 2>/dev/null || echo "none")
          echo "当前仓库版本: $CURRENT_RELEASE"

          if [ "$LATEST_RELEASE" != "$CURRENT_RELEASE" ]; then
            echo "🎉 发现新版本: $LATEST_RELEASE"
            echo "new_version=$LATEST_RELEASE" >> $GITHUB_OUTPUT
            echo "should_sync=true" >> $GITHUB_OUTPUT
          else
            echo "✅ 已是最新版本，无需同步"
            echo "new_version=none" >> $GITHUB_OUTPUT
            echo "should_sync=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-repo:
    name: Sync Repository
    needs: check-upstream
    if: needs.check-upstream.outputs.should_sync == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync from upstream
        run: |
          set -euo pipefail

          echo "🔄 开始同步上游代码..."

          git config --global user.name "ZeroClaw Build Bot"
          git config --global user.email "build@zeroclaw.local"

          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo
          cd repo

          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream

          NEW_VERSION="${{ needs.check-upstream.outputs.new_version }}"
          git checkout "${NEW_VERSION}" || {
            echo "❌ 无法检出版本 $NEW_VERSION"
            exit 1
          }

          git push origin "${NEW_VERSION}" -f || true
          git fetch upstream master:upstream_master || true
          git push origin master:master -f || true

          echo "✅ 代码同步完成！"

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-armv6:
    name: Build ARMv6 Static Binary
    needs: [check-upstream, sync-repo]
    if: needs.check-upstream.outputs.should_sync == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-upstream.outputs.new_version }}
          fetch-depth: 0

      # ✅ 修复：使用 nightly 工具链以支持 ARMv6
      - name: Setup Rust toolchain (nightly for ARMv6)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ env.TARGET }}

      - name: Install cross
        run: |
          echo "📦 安装 cross 交叉编译工具..."
          cargo install cross --locked

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ env.TARGET }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ env.TARGET }}-

      - name: Build static binary
        run: |
          set -euo pipefail

          echo "🔨 开始编译 ${{ env.TARGET }} 静态链接版本..."
          echo "📦 Rust 工具链版本:"
          rustc --version
          cargo --version

          # ✅ 使用 cross 确保兼容性
          cross build --release \
            --target ${{ env.TARGET }} \
            --locked \
            -v

          BINARY_PATH="target/${{ env.TARGET }}/release/zeroclaw"

          if [ ! -f "$BINARY_PATH" ]; then
            echo "❌ 二进制文件未找到！"
            ls -la "target/${{ env.TARGET }}/release/" || true
            exit 1
          fi

          echo "🔍 检查二进制文件类型..."
          file "$BINARY_PATH"
          ls -lh "$BINARY_PATH"
          
          # 验证静态链接
          if file "$BINARY_PATH" | grep -q "statically linked"; then
            echo "✅ 确认为静态链接二进制"
          else
            echo "⚠️ 检查链接依赖:"
            ldd "$BINARY_PATH" || true
          fi

          mkdir -p artifact
          cp "$BINARY_PATH" artifact/zeroclaw-armv6
          chmod +x artifact/zeroclaw-armv6
          echo "✅ 编译成功！"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-armv6-${{ needs.check-upstream.outputs.new_version }}
          path: artifact/zeroclaw-armv6
          retention-days: 30
          if-no-files-found: error

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: artifact/zeroclaw-armv6
          tag_name: ${{ needs.check-upstream.outputs.new_version }}
          body: |
            # ZeroClaw ${{ needs.check-upstream.outputs.new_version }} - ARMv6 Static Binary

            ## Build Information
            - **Target**: `${{ env.TARGET }}`
            - **Linking**: Static (musl)
            - **Toolchain**: Rust nightly (for ARMv6 support)
            - **Builder**: cross-rs

            ## Installation on Raspberry Pi Zero W
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ needs.check-upstream.outputs.new_version }}/zeroclaw-armv6
            chmod +x zeroclaw-armv6
            sudo mv zeroclaw-armv6 /usr/local/bin/zeroclaw
            zeroclaw --version
            ```

            ## Verification
            ```bash
            file /usr/local/bin/zeroclaw
            ldd /usr/local/bin/zeroclaw  # Should output: not a dynamic executable
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Telegram notification - Success
        if: success()
        run: |
          curl -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "text": "✅ ZeroClaw ARMv6 编译成功！\n\n📦 版本: ${{ needs.check-upstream.outputs.new_version }}\n🎯 目标: armv6l-unknown-linux-musleabihf\n📦 链接: Static (musl)\n🔗 下载: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.check-upstream.outputs.new_version }}"
            }'

      - name: Send Telegram notification - Failure
        if: failure()
        run: |
          curl -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "text": "❌ ZeroClaw ARMv6 编译失败！\n\n📦 版本: ${{ needs.check-upstream.outputs.new_version }}\n🎯 目标: armv6l-unknown-linux-musleabihf\n📍 仓库: ${{ github.repository }}\n🔗 日志: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'
