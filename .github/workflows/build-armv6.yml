# Sync Upstream and Build (optimized)
name: Sync Upstream and Build ARMv6

# Cancel previous runs when a new one starts
concurrency:
  group: sync-and-build-armv6
  cancel-in-progress: true

on:
  # scheduled check (disabled by default, uncomment to enable)
  # schedule:
  #   - cron: '0 0,12 * * *'
  workflow_dispatch:
    inputs:
      target_tag:
        description: 'Optional: force a specific tag to build (leave empty to auto-detect)'
        required: false
        default: ''

permissions:
  contents: read
  packages: read

env:
  UPSTREAM_REPO: zeroclaw-labs/zeroclaw
  # Default target: armv7l musl (recommended — robust on CI and runs on Pi Zero W)
  TARGET: armv7l-unknown-linux-musleabihf
  CARGO_TERM_COLOR: always
  # Telegram secrets (must be set in repo Secrets)
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  check-upstream:
    name: Check Upstream Release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      should_sync: ${{ steps.check.outputs.should_sync }}
    steps:
      - name: Setup gh (CLI) & git
        uses: actions/setup-node@v4
        # dummy step to ensure environment; gh is available on ubuntu-latest by default
      - name: Check upstream releases
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "🔍 Checking upstream ${UPSTREAM_REPO} for latest release..."

          # Allow manual override via workflow_dispatch input
          if [ -n "${{ github.event.inputs.target_tag }}" ]; then
            LATEST="${{ github.event.inputs.target_tag }}"
            echo "📌 Using manually provided tag: $LATEST"
          else
            # Use GH cli to fetch upstream latest release tag
            LATEST=$(gh api repos/${UPSTREAM_REPO}/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
            if [ -z "$LATEST" ]; then
              echo "⚠️ Could not determine upstream latest release"
              echo "new_version=none" >> $GITHUB_OUTPUT
              echo "should_sync=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "🔔 Upstream latest: $LATEST"
          fi

          # Determine current repo latest release (if any)
          CURRENT=$(gh api repos/${{ github.repository }}/releases --jq '.[0].tag_name' 2>/dev/null || echo "none")
          echo "Current repo latest: $CURRENT"

          if [ "$LATEST" != "$CURRENT" ]; then
            echo "🎉 New upstream release detected: $LATEST"
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
            echo "should_sync=true" >> $GITHUB_OUTPUT

            # lightweight Telegram notice (no secrets leak)
            if [ -n "${TELEGRAM_BOT_TOKEN}" ] && [ -n "${TELEGRAM_CHAT_ID}" ]; then
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"🆕 ZeroClaw upstream new release: ${LATEST} — syncing and building...\"}" || true
            fi
          else
            echo "✅ Upstream is in sync (no new release)"
            echo "new_version=none" >> $GITHUB_OUTPUT
            echo "should_sync=false" >> $GITHUB_OUTPUT
          fi

  sync-repo:
    name: Sync Repository (push tags/branches)
    needs: check-upstream
    if: needs.check-upstream.outputs.should_sync == 'true'
    runs-on: ubuntu-latest
    # This job needs write permission to push; we use PAT for pushing (minimize global write scope)
    permissions:
      contents: read
    steps:
      - name: Checkout current repo (use PAT for push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Add upstream and sync tag/branches
        env:
          UPSTREAM: ${{ env.UPSTREAM_REPO }}
          NEW_TAG: ${{ needs.check-upstream.outputs.new_version }}
          GIT_PUSH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          echo "🔄 Syncing from upstream ${UPSTREAM} -> ${GITHUB_REPOSITORY} (tag: ${NEW_TAG})"

          git remote add upstream https://github.com/${UPSTREAM}.git || true
          git fetch upstream --tags --no-recurse-submodules

          # checkout upstream tag
          git fetch upstream "refs/tags/${NEW_TAG}:refs/tags/${NEW_TAG}" || true
          git checkout "tags/${NEW_TAG}" -B "sync-${NEW_TAG}"

          # push tag and branch
          git push "https://${GIT_PUSH_TOKEN}@github.com/${{ github.repository }}.git" "refs/tags/${NEW_TAG}:refs/tags/${NEW_TAG}" --force || true
          git push "https://${GIT_PUSH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:master --force || echo "master push skipped or already up-to-date"

          echo "✅ Sync complete: ${NEW_TAG}"

      - name: Notify sync complete
        if: success()
        env:
          T
