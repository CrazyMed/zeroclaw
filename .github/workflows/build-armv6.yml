name: Build ARMv6 Static Binary

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v0.3.4-beta.232)'
        required: true
        default: 'v0.3.4-beta.232'

jobs:
  build-armv6:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cross-rs/armv6-unknown-linux-musl:latest
    steps:
      - name: Checkout upstream
        uses: actions/checkout@v4
        with:
          repository: zeroclaw-labs/zeroclaw
          ref: ${{ github.event.inputs.version }}
      
      - name: Build static ARMv6 binary
        run: |
          cargo build --release
          strip /build/target/armv6-unknown-linux-musl/release/zeroclaw
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-armv6-static-${{ github.event.inputs.version }}
          path: target/armv6-unknown-linux-musl/release/zeroclaw
