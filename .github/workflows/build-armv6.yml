name: 自动同步并构建 ARMv6 版本

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

env:
  TARGET: armv6l-unknown-linux-musleabihf
  UPSTREAM_REPO: zeroclaw-labs/zeroclaw
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  sync_and_build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Get latest upstream version
        id: get_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "正在查询上游最新版本..."
          # 使用环境变量传递仓库名，避免在命令中直接拼接 ${{ }}
          REPO_NAME="${{ env.UPSTREAM_REPO }}"
          LATEST_VERSION=$(gh api repos/$REPO_NAME/releases/latest --jq '.tag_name')
          
          if [ -z "$LATEST_VERSION" ]; then
            echo "❌ 无法获取上游版本信息。"
            exit 1
          fi
          
          echo "upstream_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ 上游最新版本为: $LATEST_VERSION"

      - name: Sync upstream code
        env:
          VERSION: ${{ steps.get_version.outputs.upstream_version }}
        run: |
          echo "开始同步 $VERSION 版本代码..."
          
          git remote add upstream "https://github.com/${{ env.UPSTREAM_REPO }}.git"
          git fetch upstream --tags
          
          # 使用 -B 强制重置 master 分支到上游标签
          git checkout -B master "tags/$VERSION"
          
          git push origin master --force
          echo "✅ 代码同步完成。"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ env.TARGET }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Setup Rust caching
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ env.TARGET }}

      - name: Build static binary
        run: |
          echo "🔨 开始编译 ${{ env.TARGET }} ..."
          export CARGO_BUILD_JOBS=2
          
          cross build --release --target ${{ env.TARGET }} --locked
          
          mkdir -p artifact
          cp target/${{ env.TARGET }}/release/zeroclaw artifact/zeroclaw-armv6
          chmod +x artifact/zeroclaw-armv6
          ls -lh artifact/zeroclaw-armv6

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-armv6-binary
          path: artifact/zeroclaw-armv6
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          VERSION: ${{ steps.get_version.outputs.upstream_version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.upstream_version }}-armv6
          name: ZeroClaw ${{ steps.get_version.outputs.upstream_version }} (ARMv6)
          body: |
            自动同步自上游 ${{ steps.get_version.outputs.upstream_version }} 版本。
            此版本为树莓派 Zero W 优化的 ARMv6 静态链接版本。
          files: artifact/zeroclaw-armv6

      - name: Send success notification to Telegram
        if: success()
        env:
          VERSION: ${{ steps.get_version.outputs.upstream_version }}
        run: |
          MESSAGE="✅ ZeroClaw ARMv6 构建成功！%0A%0A📦 版本: $VERSION%0A🔗 Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${VERSION}-armv6"
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
               -d "chat_id=${{ env.TELEGRAM_CHAT_ID }}&text=$MESSAGE"

      - name: Send failure notification to Telegram
        if: failure()
        run: |
          MESSAGE="❌ ZeroClaw ARMv6 构建失败！%0A%0A🔗 日志: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
               -d "chat_id=${{ env.TELEGRAM_CHAT_ID }}&text=$MESSAGE"
