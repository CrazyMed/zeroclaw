name: Build ARMv6 Static Binary

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v0.3.4-beta.232)'
        required: true
        default: 'v0.3.4-beta.232'

jobs:
  build-armv6:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream
        uses: actions/checkout@v4
        with:
          repository: zeroclaw-labs/zeroclaw
          ref: ${{ github.event.inputs.version }}
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: arm-unknown-linux-musleabihf
      
      - name: Install musl-cross
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev
      
      - name: Build static ARMv6 binary
        run: |
          cargo build --release --target arm-unknown-linux-musleabihf
          strip target/arm-unknown-linux-musleabihf/release/zeroclaw
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-armv6-static-${{ github.event.inputs.version }}
          path: target/arm-unknown-linux-musleabihf/release/zeroclaw