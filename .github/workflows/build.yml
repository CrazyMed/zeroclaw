name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  build:
    strategy:
      matrix:
        include:

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: zeroclaw-windows.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: zeroclaw-linux-x64

          - os: ubuntu-latest
            target: armv6-unknown-linux-musleabihf
            name: zeroclaw-raspberrypi

    runs-on: ${{ matrix.os }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cross

      - name: Build
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cargo build --release
            copy target\release\zeroclaw.exe ${{ matrix.name }}
          else
            cross build --release --target ${{ matrix.target }}
            cp target/${{ matrix.target }}/release/zeroclaw ${{ matrix.name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
