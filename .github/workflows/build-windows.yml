name: build-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable

      - name: build
        run: cargo build --release

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-windows
          path: target/release/zeroclaw.exe
